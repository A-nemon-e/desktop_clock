version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: desktop_clock
      POSTGRES_USER: clock_user
      POSTGRES_PASSWORD: clock_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clock_user -d desktop_clock"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clock_user:clock_pass@postgres:5432/desktop_clock
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SESSION_EXPIRE_HOURS: "24"
      QWEATHER_API_KEY: ${QWEATHER_API_KEY}
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      FIRMWARE_STORAGE_PATH: /data/firmware
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    volumes:
      - firmware_data:/data/firmware

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
  firmware_data:
