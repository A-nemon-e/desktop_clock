# Device topics: clock/{mac}/status, config_report, ota_status
# Devices can publish their own status and subscribe to config/OTA/weather

# Allow devices to publish their status topics
pattern write clock/+/status
pattern write clock/+/config_report
pattern write clock/+/ota_status

# Allow devices to subscribe to their own commands
pattern read clock/+/config
pattern read clock/+/ota
pattern read clock/+/weather

# Backend bridge has full access to all clock topics
user backend_bridge
topic clock/#
